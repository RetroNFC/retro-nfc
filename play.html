<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retrô NFC</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    
    <!-- 1. TELA PRINCIPAL (Informações do Jogo) -->
    <section id="gameScreen">
        <!-- Substitua o src abaixo se o app.js não injetar a imagem automaticamente -->
        <img id="gameCover" src="sua-imagem-aqui.jpg" alt="Capa do Jogo">
        <h1 id="title">Donkey Kong Country 2</h1>
        <h2 id="subtitle">Diddy's Kong Quest</h2>
        
        <div class="info">
            <p id="year">Ano: 1995</p>
            <p id="players">Jogadores: 1-2</p>
            <p id="developer">Desenvolvedora: Rare</p>
        </div>
        
        <button id="btnJogar" onclick="startBoot()">JOGAR</button>
    </section>

    <!-- 2. TELA DE BOOT (Invisível até clicar em JOGAR) -->
    <section id="bootScreen" style="display: none;">
        <div class="header">
            <div class="bootLogo">RETRÔ NFC</div>
            <div class="bootConsole">SUPER NINTENDO</div>
        </div>
        <div id="bootTerminal" class="bootTerminal"></div>
        <!-- A barra de loading vai ficar presa aqui embaixo -->
        <div id="progressText" class="progressText">□□□□□□□□□□</div>
    </section>

    <!-- 3. TELA DE ERRO (Invisível por padrão) -->
    <section id="invalidScreen" style="display: none;">
        <h1 class="errorTitle">RETRO NFC</h1>
        <h2 class="errorSub">Cartucho inválido</h2>
        <p class="errorText">Esta tag NFC não possui um jogo válido cadastrado.</p>
    </section>

    <!-- Scripts (Sem o áudio e o game.js para evitar conflitos) -->
    <script src="assets/js/app.js"></script>
    <script src="assets/js/boot.js"></script>
</body>
</html>

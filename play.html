<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro NFC</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <section id="gameScreen">
        <img id="gameCover" src="" alt="Capa do Jogo">
        <h1 id="title">Carregando...</h1>
        <h2 id="subtitle"></h2>
        <div class="info">
            <p id="year"></p>
            <p id="players"></p>
            <p id="developer"></p>
        </div>
        <button id="btnJogar">JOGAR</button>
    </section>

    <section id="bootScreen" style="display: none;">
        <div id="bootTextContainer"></div>
        <button id="btnStartGame" style="display:none; margin-top: 20px;">PRESS START</button>
    </section>

    <section id="emulatorScreen" style="display: none;"></section>

    <section id="invalidScreen" style="display: none;">
        <h1>Cartucho inválido</h1>
    </section>

    <script src="assets/js/app.js"></script>
    <script src="assets/js/boot.js"></script>
</body>
</html>

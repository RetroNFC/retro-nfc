<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retrô NFC</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        /* Correção para garantir que o botão JOGAR fique sempre centralizado */
        #gameScreen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            text-align: center;
            margin: 0;
        }
    </style>
</head>
<body>
    <div id="splashScreen">
        <img src="assets/img/retronfc.png" alt="Logo Retrô NFC">
    </div>
    
    <div class="scanlines"></div>

    <!-- 1. TELA PRINCIPAL (Informações do Jogo) -->
    <section id="gameScreen">
        <img id="gameCover" src="" alt="Capa do Jogo">
        <h1 id="title">Carregando...</h1>
        <h2 id="subtitle"></h2>
        
        <div class="info">
            <p id="year"></p>
            <p id="players"></p>
            <p id="developer"></p>
        </div>
        
        <button id="btnJogar" onclick="startBoot()">CARREGAR JOGO</button>
    </section>

    <!-- 2. TELA DE BOOT (Terminal) -->
    <section id="bootScreen" style="display: none;">
        <div class="header">
            <div class="bootLogo">RETRÔ NFC</div>
            <div class="bootConsole">SUPER NINTENDO</div>
        </div>
        <div id="bootTerminal" class="bootTerminal"></div>
        <div id="progressText" class="progressText">□□□□□□□□□□</div>
    </section>

    <!-- 3. TELA DO EMULADOR (Onde a mágica acontece) -->
    <section id="emulatorScreen" style="display: none; width: 100vw; height: 100vh;">
        <div style="width:100%; height:100%; max-width:100%;">
            <div id="game"></div>
        </div>
    </section>

    <!-- 4. TELA DE ERRO -->
    <section id="invalidScreen" style="display: none;">
        <h1 class="errorTitle">RETRO NFC</h1>
        <h2 class="errorSub">Cartucho inválido</h2>
        <p class="errorText">Esta tag NFC não possui um jogo válido cadastrado.</p>
    </section>

    <audio id="bootSound" src="assets/life.mp3"></audio>

    <script src="assets/js/app.js"></script>
    <script src="assets/js/boot.js"></script>
    <script src="assets/js/analytics.js"></script>
</body>
</html>
